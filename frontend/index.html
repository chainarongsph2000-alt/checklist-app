<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 ตรวจแบบ — เทศบาลตำบลเมืองเก่า</title>
<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 1rem; }

/* Nav */
.nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
}
.nav-title {
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
}
.nav-title span { color: var(--accent); }
.nav-select {
    flex: 1;
    max-width: 350px;
    padding: 0.5rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
}
.nav-search {
    flex: 1;
    max-width: 300px;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
}
.nav-search:focus { outline: none; border-color: var(--accent); }
.hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.5rem;
    cursor: pointer;
}

/* Layout */
.main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 1rem; margin-top: 1rem; }
@media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .nav-select, .nav-search { max-width: 100%; }
    .hamburger { display: block; }
}

/* Cards */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
}
.card-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.card-title .badge {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    font-weight: 600;
}
.badge-green { background: #166534; color: #86efac; }
.badge-yellow { background: #854d0e; color: #fde68a; }
.badge-red { background: #991b1b; color: #fca5a5; }

/* Checkbox items */
.check-item { margin-right: 0.5rem; transform: scale(1.2); cursor: pointer; }
.check-label {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.4rem 0;
    cursor: pointer;
    border-bottom: 1px solid #1e293b;
    font-size: 0.92rem;
    line-height: 1.5;
}
.check-label:last-child { border-bottom: none; }
.check-label.passed { color: var(--success); }
.check-label.failed { color: var(--danger); }
.check-label .law-link {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    font-size: 0.85rem;
}

/* Summary bar */
.summary-bar {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.75rem;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 1rem;
}
.summary-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
}
.summary-num {
    font-size: 1.5rem;
    font-weight: 700;
}

/* Law sidebar */
.law-panel {
    position: sticky;
    top: 80px;
}
.law-content {
    font-size: 0.88rem;
    line-height: 1.6;
    max-height: 70vh;
    overflow-y: auto;
}
.law-content h1 { font-size: 1.1rem; margin-bottom: 0.5rem; }
.law-content h2 { font-size: 1rem; margin: 0.75rem 0 0.3rem; }
.law-content h3 { font-size: 0.95rem; margin: 0.5rem 0 0.2rem; }
.law-content a { color: var(--accent); }
.law-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.82rem; }
.law-content td, .law-content th { border: 1px solid var(--border); padding: 0.3rem 0.5rem; }
.law-content tr:nth-child(even) { background: #0f172a; }
.law-content .check-item { pointer-events: none; }

/* Search results */
.search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 400px;
    overflow-y: auto;
    display: none;
    z-index: 200;
}
.search-results.show { display: block; }
.search-item {
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
}
.search-item:hover { background: var(--border); }
.search-item .file { color: var(--muted); font-size: 0.75rem; }

/* Loading */
.loading { text-align: center; padding: 2rem; color: var(--muted); }
.loading::after { content: '⏳'; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Print btn */
.btn {
    padding: 0.4rem 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

/* Empty state */
.empty-state { text-align: center; padding: 3rem; color: var(--muted); }
.empty-state h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }

/* Generated letter modal */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 300;
}
.modal-overlay.show { display: flex; }
.modal {
    background: var(--card); border-radius: 12px; padding: 1.5rem;
    max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal textarea { width: 100%; min-height: 200px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-family: inherit; font-size: 0.88rem; }
.modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
    <div class="nav-title" onclick="loadHome()">📋 <span>ตรวจแบบ</span></div>
    <select class="nav-select" id="checklistSelect" onchange="loadChecklist(this.value)">
        <option value="">— เลือกประเภทอาคาร —</option>
    </select>
    <div style="position:relative;flex:1;max-width:300px">
        <input class="nav-search" id="searchInput" placeholder="🔍 ค้นหากฎหมาย..." oninput="searchLaw(this.value)">
        <div class="search-results" id="searchResults"></div>
    </div>
    <button class="btn btn-primary" onclick="window.print()">🖨️</button>
</nav>

<div class="container">
    <div class="main-grid" id="mainContent">
        <!-- Left: Checklist -->
        <div id="checklistPanel">
            <div class="empty-state" id="emptyState">
                <h2>👋 ยินดีต้อนรับ</h2>
                <p>เลือกประเภทอาคารจากเมนูด้านบนเพื่อเริ่มตรวจแบบ</p>
                <p style="margin-top:0.5rem;font-size:0.85rem;">หรือพิมพ์ชื่อกฎหมายที่ต้องการค้นหา</p>
            </div>
            <div id="checklistContent" style="display:none;"></div>
        </div>
        <!-- Right: Law Panel -->
        <div class="law-panel" id="lawPanel">
            <div class="card">
                <div class="card-title">📖 กฎหมายที่เกี่ยวข้อง</div>
                <div class="law-content" id="lawContent">
                    <p style="color:var(--muted);font-size:0.85rem;">คลิกที่ link สีฟ้าใน checklist เพื่อดูรายละเอียดกฎหมาย</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="letterModal">
    <div class="modal">
        <h3 style="margin-bottom:0.75rem;">📝 ร่างหนังสือแจ้ง</h3>
        <textarea id="letterText" readonly></textarea>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeLetter()">ปิด</button>
            <button class="btn btn-primary" onclick="copyLetter()">📋 คัดลอก</button>
        </div>
    </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────
let currentChecklist = null;
let failedItems = [];

// ─── Load checklists ────────────────────────────────────────
async function loadChecklists() {
    const res = await fetch('/api/checklists');
    const lists = await res.json();
    const sel = document.getElementById('checklistSelect');
    lists.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.id;
        opt.textContent = l.title;
        sel.appendChild(opt);
    });
}

// ─── Load checklist ─────────────────────────────────────────
async function loadChecklist(id) {
    if (!id) { showHome(); return; }
    const res = await fetch(`/api/checklist/${id}`);
    const data = await res.json();
    if (!data || data.error) return;
    currentChecklist = data;
    failedItems = [];
    renderChecklist(data);
}

// ─── Render checklist ───────────────────────────────────────
function renderChecklist(data) {
    document.getElementById('emptyState').style.display = 'none';
    const panel = document.getElementById('checklistContent');
    panel.style.display = 'block';
    
    // Extract only the main body (skip header H1)
    let html = data.html;
    const titleMatch = data.title;
    
    html = `<div class="card"><div class="card-title" style="font-size:1.2rem;">${titleMatch} <span class="badge badge-yellow">🟡 ปานกลาง</span></div>`;
    html += `<div class="summary-bar" id="summaryBar">
        <div class="summary-item">✅ <span class="summary-num" id="passedCount">0</span> ผ่าน</div>
        <div class="summary-item">❌ <span class="summary-num" id="failedCount">0</span> ไม่ผ่าน</div>
        <div class="summary-item">📋 <span class="summary-num" id="totalCount">0</span> รายการ</div>
    </div>`;
    
    // Parse and render body
    const bodyHtml = data.html;
    html += `<div class="checklist-body">${bodyHtml}</div>`;
    html += `<div style="margin-top:1rem;display:flex;gap:0.5rem;">
        <button class="btn btn-success" onclick="generateLetter('passed')">📄 ร่างหนังสือแจ้งผ่าน</button>
        <button class="btn btn-danger" onclick="generateLetter('failed')">📄 ร่างหนังสือแจ้งแก้ไข</button>
    </div></div>`;
    
    panel.innerHTML = html;
    attachCheckboxListeners();
    updateSummary();
}

// Attach checkbox listeners
function attachCheckboxListeners() {
    document.querySelectorAll('.check-item').forEach(cb => {
        cb.addEventListener('change', updateSummary);
    });
}

// Update summary
function updateSummary() {
    const checkboxes = document.querySelectorAll('.check-item');
    const total = checkboxes.length;
    let passed = 0;
    let failed = 0;
    checkboxes.forEach(cb => {
        const label = cb.closest('.check-label') || cb.parentElement;
        if (cb.checked) {
            passed++;
            label?.classList.add('passed');
            label?.classList.remove('failed');
        } else {
            failed++;
            label?.classList.add('failed');
            label?.classList.remove('passed');
        }
    });
    document.getElementById('passedCount').textContent = passed;
    document.getElementById('failedCount').textContent = failed;
    document.getElementById('totalCount').textContent = total;
    
    // Gather failed item texts
    failedItems = [];
    document.querySelectorAll('.check-item:not(:checked)').forEach(cb => {
        const label = cb.closest('.check-label') || cb.parentElement;
        if (label) failedItems.push(label.textContent.trim().split('\n')[0]);
    });
}

// ─── Show law ────────────────────────────────────────────────
async function showLaw(lawPath) {
    const panel = document.getElementById('lawContent');
    panel.innerHTML = '<div class="loading">⏳ กำลังโหลด...</div>';
    try {
        const res = await fetch(`/api/law/${lawPath}`);
        const data = await res.json();
        if (data.error) {
            panel.innerHTML = `<p style="color:var(--danger);">❌ ไม่พบ: ${lawPath}</p>`;
            return;
        }
        panel.innerHTML = data.html || '<p>ไม่พบเนื้อหา</p>';
    } catch(e) {
        panel.innerHTML = `<p style="color:var(--danger);">❌ Error: ${e.message}</p>`;
    }
}

// Intercept law links
document.addEventListener('click', function(e) {
    const link = e.target.closest('.law-link');
    if (link) {
        e.preventDefault();
        const href = link.getAttribute('href').replace('/api/law/', '');
        showLaw(href);
    }
});

// ─── Search ──────────────────────────────────────────────────
let searchTimeout;
function searchLaw(q) {
    clearTimeout(searchTimeout);
    const results = document.getElementById('searchResults');
    if (q.length < 2) { results.classList.remove('show'); return; }
    searchTimeout = setTimeout(async () => {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        results.innerHTML = '';
        if (data.length === 0) {
            results.innerHTML = '<div class="search-item" style="color:var(--muted);">ไม่พบผลลัพธ์</div>';
        } else {
            data.slice(0, 10).forEach(r => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `${r.context} <span class="file">📄 ${r.file}</span>`;
                div.onclick = () => {
                    document.getElementById('searchInput').value = '';
                    results.classList.remove('show');
                    // Show law
                    const path = r.file.replace('.md', '').replace(/^กฎหมาย\//, '');
                    showLaw(path);
                };
                results.appendChild(div);
            });
        }
        results.classList.add('show');
    }, 300);
}
document.addEventListener('click', function(e) {
    if (!e.target.closest('.nav-search') && !e.target.closest('.search-results')) {
        document.getElementById('searchResults').classList.remove('show');
    }
});

// ─── Generate letter ─────────────────────────────────────────
function generateLetter(mode) {
    if (!currentChecklist) return;
    const now = new Date();
    const dateStr = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
    
    let body = '';
    if (mode === 'passed') {
        body = `ด้วยเจ้าพนักงานท้องถิ่นได้ตรวจแบบแปลนการก่อสร้างแล้ว ปรากฏว่าเป็นไปตามที่กำหนดในกฎกระทรวงฯ และกฎหมายที่เกี่ยวข้อง จึงแจ้งให้ทราบ`;
    } else {
        const failed = failedItems.map((item, i) => `${i+1}. ${item}`).join('\n');
        body = `ด้วยเจ้าพนักงานท้องถิ่นได้ตรวจแบบแปลนการก่อสร้างแล้ว ปรากฏว่ารายการต่อไปนี้ไม่เป็นไปตามที่กฎหมายกำหนด\n\n${failed}\n\nจึงขอให้ดำเนินการแก้ไขและยื่นเอกสารใหม่ภายใน 15 วัน`;
    }
    
    const letter = `เรื่อง แจ้งผลการตรวจแบบแปลน\n\nเรียน ${currentChecklist.title || 'ผู้ยื่นคำขอ'}\n\n${body}\n\nจึงแจ้งมาเพื่อทราบและดำเนินการ\n\nลงวันที่ ${dateStr}\n\n(ลงชื่อ) เจ้าพนักงานท้องถิ่น\nเทศบาลตำบลเมืองเก่า`;
    
    document.getElementById('letterText').value = letter;
    document.getElementById('letterModal').classList.add('show');
}

function closeLetter() {
    document.getElementById('letterModal').classList.remove('show');
}

function copyLetter() {
    const text = document.getElementById('letterText');
    text.select();
    navigator.clipboard.writeText(text.value).then(() => {
        alert('✅ คัดลอกแล้ว');
    }).catch(() => {
        text.select();
        document.execCommand('copy');
        alert('✅ คัดลอกแล้ว');
    });
}

// ─── Home ────────────────────────────────────────────────────
function showHome() {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('checklistContent').style.display = 'none';
    document.getElementById('lawContent').innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">คลิกที่ link สีฟ้าใน checklist เพื่อดูรายละเอียดกฎหมาย</p>';
}

function loadHome() {
    document.getElementById('checklistSelect').value = '';
    showHome();
}

// ─── Init ────────────────────────────────────────────────────
loadChecklists();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Dashboard — ตรวจแบบ</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* Dashboard-specific styles */
.dashboard-header { margin-bottom: 1.5rem; }
.dashboard-header h1 { font-size: 1.5rem; }
.dashboard-header a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
.stat-card .num { font-size: 2.2rem; font-weight: 700; }
.stat-card .label { font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }
.stat-card.blue .num { color: var(--accent); }
.stat-card.green .num { color: var(--success); }
.stat-card.yellow .num { color: var(--warning); }
.stat-card.red .num { color: var(--danger); }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
@media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

.recent-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.recent-table th { text-align: left; padding: 0.5rem; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 600; }
.recent-table td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
.pass-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
.pass-badge.ok { background: #166534; color: #86efac; }
.pass-badge.fail { background: #991b1b; color: #fca5a5; }

.hidden { display: none; }
.loading-dash { text-align: center; padding: 3rem; color: var(--muted); }
</style>
</head>
<body>
<nav class="nav">
    <div class="nav-title">📊 <span>Dashboard</span></div>
    <div style="margin-left:auto;">
        <a href="/" class="btn btn-ghost" style="text-decoration:none;">← กลับไปตรวจแบบ</a>
    </div>
</nav>

<div class="container">
    <div id="dashboardContent" class="loading-dash">⏳ กำลังโหลด...</div>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
